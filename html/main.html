<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="style.css">
    <script src="vendor/jquery.min.js"></script>
    <script src="script.js"></script>
  </head>
  <body>
    <div class="main" id="main">
        <div id="gameScrew" class="game">
            <div id="bigScrewdriver" class="bigScrewdriver"></div>
            <div id="smallScrewdriver" class="smallScrewdriver"></div>
            <div id="crackedKeyHole" class="crackedKeyHole"></div>
            <div id="rotatingCircle" class="rotatingCircle"></div>
        </div>
        <div id="gameSpark" class="game">
            <div class="wpanel" id="wpanel">
                <div class="plabel">Ignition wiring</div>
                <div class="wscrew" style="top:2%;left:1.5%"></div>
                <div class="wscrew" style="top:2%;right:1.5%"></div>
                <div class="wscrew" style="bottom:2%;left:1.5%"></div>
                <div class="wscrew" style="bottom:2%;right:1.5%"></div>
                <div id="swireL" class="swire left"></div>
                <div id="swireGap" class="swiregap"></div>
                <div id="swireR" class="swire right"></div>
                <div id="sparkTrack" class="sparktrack">
                    <div id="sparkZone" class="sparkzone"></div>
                    <div id="sparkNeedle" class="sparkneedle"></div>
                </div>
                <div id="sparkPips" class="sparkpips"></div>
                <div id="spark" class="spark">✦</div>
            </div>
        </div>
        <div id="gameImmo" class="game">
            <div class="ipanel" id="ipanel">
                <div class="iscreen" id="iscreen">
                    <div class="itarget" id="immoTarget"></div>
                    <div class="islots" id="immoSlots"></div>
                </div>
                <div class="ikeys">
                    <div class="ikey"></div><div class="ikey"></div><div class="ikey"></div>
                    <div class="ikey"></div><div class="ikey"></div><div class="ikey"></div>
                </div>
                <div class="ibrand">V-Lock Security</div>
            </div>
        </div>
        <div id="hintText" class="hintText"></div>
        <div id="timerBarBackground" class="timerBarBackground">
            <div id="timerBar" class="timerBar"></div>
        </div>
    </div>
  </body>
</html>
